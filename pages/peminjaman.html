<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Peminjaman</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">siPerpus</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="buku.html">Buku</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="anggota.html">Anggota</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="peminjaman.html">Peminjaman</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="pengembalian.html">Pengembalian</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mx-auto mt-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold mb-0">Daftar Peminjaman</h5>
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalTambahPeminjaman">
                + Tambah Peminjaman
            </button>
        </div>
        <table class="table table-info table-striped">
            <thead>
                <tr>
                    <th class="text-center" style="font-size: 0.8rem;">#</th>
                    <th class="text-center text-uppercase" style="font-size: 0.8rem;">Anggota</th>
                    <th class="text-center text-uppercase" style="font-size: 0.8rem;">Judul Buku</th>
                    <th class="text-center text-uppercase" style="font-size: 0.8rem;">Tgl Pinjam</th>
                    <th class="text-center text-uppercase" style="font-size: 0.8rem;">Tgl Kembali</th>
                    <th class="text-center text-uppercase" style="font-size: 0.8rem;">Status</th>
                    <th class="text-center text-uppercase" style="font-size: 0.8rem;">Aksi</th>
                </tr>
            </thead>
            <tbody id="tabel-peminjaman"></tbody>
        </table>
    </div>

    <!-- Modal Tambah -->
    <div class="modal fade" id="modalTambahPeminjaman" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Tambah Peminjaman</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Anggota</label>
                            <select class="form-select" id="idAnggota"></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Buku</label>
                            <select class="form-select" id="idBuku"></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tanggal Pinjam</label>
                            <input type="date" class="form-control" id="tanggalPinjam">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tanggal Kembali</label>
                            <input type="date" class="form-control" id="tanggalKembali">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="button" class="btn btn-primary" onclick="tambahPeminjaman()" data-bs-dismiss="modal">+ Tambah</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Edit -->
    <div class="modal fade" id="modalEditPeminjaman" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Peminjaman</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form>
                    <div class="modal-body">
                        <input type="hidden" id="editId">
                        <div class="mb-3">
                            <label class="form-label">Anggota</label>
                            <select class="form-select" id="editIdAnggota"></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Buku</label>
                            <select class="form-select" id="editIdBuku"></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tanggal Pinjam</label>
                            <input type="date" class="form-control" id="editTanggalPinjam">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tanggal Kembali</label>
                            <input type="date" class="form-control" id="editTanggalKembali">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select class="form-select" id="editStatus">
                                <option value="Dipinjam">Dipinjam</option>
                                <option value="Terlambat">Terlambat</option>
                                <option value="Selesai">Selesai</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="button" class="btn btn-primary" onclick="simpanEditPeminjaman()" data-bs-dismiss="modal">Simpan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            renderTabelPeminjaman();
            populateDropdown();
        });

        document.getElementById("modalTambahPeminjaman").addEventListener("hidden.bs.modal", () => {
            document.getElementById("idAnggota").value    = "";
            document.getElementById("idBuku").value       = "";
            document.getElementById("tanggalPinjam").value  = "";
            document.getElementById("tanggalKembali").value = "";
        });

        document.getElementById("modalEditPeminjaman").addEventListener("hidden.bs.modal", () => {
            document.getElementById("editId").value            = "";
            document.getElementById("editTanggalPinjam").value  = "";
            document.getElementById("editTanggalKembali").value = "";
        });

        document.addEventListener("click", (e) => {
            if (e.target.classList.contains("btn-edit")) {
                const id = parseInt(e.target.dataset.id);
                openEditModal(id);
            }
            if (e.target.classList.contains("btn-hapus")) {
                const id = parseInt(e.target.dataset.id);
                hapusPeminjaman(id);
            }
        });
    </script>
    <script src="../js/data.js"></script>
    <script src="../js/peminjaman.js"></script>
</body>

</html>
