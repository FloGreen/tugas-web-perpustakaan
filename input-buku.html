<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Input Buku - Dashboard Perpustakaan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@600;800&display=swap" rel="stylesheet" />
  <style>
    body { background: linear-gradient(180deg, #f8fbff 0%, #f3f7fc 55%, #eef3f9 100%); }
    h1, h2, h3, .navbar-brand { font-family: 'Poppins', sans-serif; }
    .brand-logo { width: 40px; aspect-ratio: 1; border-radius: 50%; background: radial-gradient(circle at top, #2f8f9d, #1f4b7a 70%); }
    .bg-primary-custom { background-color: #1f4b7a !important; }
    .text-primary-custom { color: #16385b !important; }
    .text-muted-custom { color: #5d6b7e !important; }
  </style>
</head>
<body>
  <header class="navbar navbar-expand-md sticky-top bg-white bg-opacity-75 border-bottom" style="backdrop-filter: blur(12px);">
    <div class="container py-2">
      <a href="dashboard.html" class="navbar-brand d-flex align-items-center gap-2 fw-bold text-primary-custom">
        <span class="brand-logo d-inline-block"></span>
        <span>Input Buku</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <nav class="navbar-nav gap-2 fw-semibold">
          <a class="nav-link text-muted-custom" href="dashboard.html">Dashboard</a>
          <a class="nav-link active text-primary" href="input-buku.html">Input Buku</a>
          <a class="nav-link text-muted-custom" href="input-anggota.html">Input Anggota</a>
          <a class="nav-link text-muted-custom" href="input-transaksi.html">Peminjaman & Pengembalian</a>
          <a class="nav-link text-muted-custom" href="index.html">Website</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="py-5">
    <div class="container">
      <h1 class="h3 fw-bold text-primary-custom mb-1">Input Buku Baru</h1>
      <p class="text-muted-custom mb-4">Data buku akan tampil di beranda dan halaman detail.</p>

      <div class="card p-4 rounded-3 shadow-sm border mb-4">
        <form id="formBuku" class="row g-3">
          <div class="col-md-6">
            <label for="judul" class="form-label small fw-semibold">Judul Buku</label>
            <input id="judul" class="form-control" type="text" placeholder="Masukkan judul buku" required />
          </div>
          <div class="col-md-6">
            <label for="penulis" class="form-label small fw-semibold">Penulis</label>
            <input id="penulis" class="form-control" type="text" placeholder="Nama penulis" required />
          </div>
          <div class="col-md-4">
            <label for="kategori" class="form-label small fw-semibold">Kategori</label>
            <select id="kategori" class="form-select">
              <option>Informatika</option>
              <option>Ekonomi</option>
              <option>Hukum</option>
              <option>Umum</option>
            </select>
          </div>
          <div class="col-md-4">
            <label for="stok" class="form-label small fw-semibold">Stok</label>
            <input id="stok" class="form-control" type="number" min="1" value="1" required />
          </div>
          <div class="col-md-4">
            <label for="gambar" class="form-label small fw-semibold">URL Gambar (opsional)</label>
            <input id="gambar" class="form-control" type="url" placeholder="https://..." />
          </div>
          <div class="col-12">
            <label for="deskripsi" class="form-label small fw-semibold">Deskripsi</label>
            <textarea id="deskripsi" class="form-control" rows="3" placeholder="Ringkasan buku..."></textarea>
          </div>
          <div class="col-12 d-flex gap-2">
            <button id="btnSubmitBuku" class="btn btn-primary bg-primary-custom border-0 rounded-2 px-4" type="submit">Simpan Data Buku</button>
            <button id="btnBatalBuku" class="btn btn-outline-secondary rounded-2 px-4" type="button">Batal Edit</button>
          </div>
        </form>
      </div>

      <h2 class="h5 fw-bold text-primary-custom mb-3">Tabel Hasil Input Buku (5 Data Terbaru)</h2>
      <div class="table-responsive shadow-sm rounded-3 border bg-white">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Judul</th>
              <th>Penulis</th>
              <th>Kategori</th>
              <th>Stok</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="hasilBukuBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/input-buku.js"></script>
</body>
</html>
